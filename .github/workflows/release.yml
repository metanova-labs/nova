name: release

# Triggers:
#   - push to main → run lint + tests, build the validator image, smoke-test it,
#                    and (if smoke passes) publish tags `latest`, `main`,
#                    `sha-<full>` and `sha-<short>` to Docker Hub.
#   - pull_request → run lint + tests + build + smoke (NO push). The build is
#                    cached via gha so subsequent runs are faster.
on:
  push:
    branches: [main]
  pull_request:

# Avoid stacking pushes on the same ref (e.g. force-push to a PR branch).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.7.4
      - run: ruff check .

  tests:
    name: unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest==8.3.4 pyyaml==6.0.2
      - run: pytest tests/

  build-and-smoke:
    name: build + smoke (and push on main)
    needs: [lint, tests]
    runs-on: ubuntu-latest
    env:
      # Resolved late so the workflow file works in forks without secrets:
      # IMAGE_REPO ends up empty in PRs from forks (push step is skipped anyway).
      IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME && format('{0}/{1}', secrets.DOCKERHUB_USERNAME, vars.IMAGE_NAME || 'nova-validator') || '' }}
      TMP_TAG: nova-validator:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (load locally for smoke tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.TMP_TAG }}
          cache-from: type=gha,scope=validator
          cache-to: type=gha,mode=max,scope=validator

      - name: Smoke — import validator module
        run: |
          docker run --rm \
            --entrypoint /app/nova/.venv/bin/python3 \
            -e PYTHONPATH=/app/nova \
            ${{ env.TMP_TAG }} \
            -c "import neurons.validator.validator as v; print('ok', v.__file__)"

      - name: Smoke — external tools on PATH
        run: |
          docker run --rm \
            --entrypoint /bin/bash \
            ${{ env.TMP_TAG }} \
            -c "command -v mmseqs && command -v igblastn"

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute publish tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=sha-,format=long
            type=sha,prefix=sha-,format=short

      - name: Push (cache hit, near-instant)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=validator
